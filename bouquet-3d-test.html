<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>3D Test v4 — Diagnostic</title>
  <style>
    * { margin: 0; padding: 0; }
    /* BRIGHT RED body — if you see red, the canvas is NOT covering it */
    body { background: #ff3333; width: 100%; height: 100%; overflow: hidden; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    #info {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.95); padding: 8px 16px; border-radius: 10px;
      font-family: monospace; font-size: 13px; z-index: 999; text-align: center;
      line-height: 1.6; max-width: 300px;
    }
  </style>
</head>
<body>
<div id="info">loading…</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var info = document.getElementById('info');

// Step 1 — did Three.js load?
if (typeof THREE === 'undefined') {
  info.textContent = '❌ Three.js DID NOT load from CDN';
} else {
  info.innerHTML = '✅ THREE r' + THREE.REVISION + ' loaded<br>setting up renderer…';

  var renderer, scene, camera, frame = 0;

  try {
    // Step 2 — create renderer (solid blue background so we KNOW canvas is on top)
    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setPixelRatio(1);   // no DPR scaling — keep it simple
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x0066ff, 1);   // BRIGHT BLUE — not red, not pink
    document.body.appendChild(renderer.domElement);
    info.innerHTML = '✅ THREE r' + THREE.REVISION + '<br>✅ renderer created<br>building scene…';

    // Step 3 — minimal scene: camera + 1 red sphere
    scene  = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.z = 5;

    // Bright red sphere — MeshBasicMaterial needs NO lights
    var sphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.2, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xff2222 })
    );
    // sphere is at origin (0,0,0) by default
    scene.add(sphere);

    info.innerHTML = '✅ THREE r' + THREE.REVISION + '<br>✅ renderer created<br>✅ scene built — animating…';

    // Step 4 — animate
    function animate() {
      requestAnimationFrame(animate);
      frame++;
      sphere.rotation.y += 0.02;
      try {
        renderer.render(scene, camera);
        if (frame % 30 === 0) {
          info.innerHTML = '✅ THREE r' + THREE.REVISION
            + '<br>✅ renderer + scene OK'
            + '<br>🎬 frame ' + frame
            + '<br><small>see blue bg + red sphere?</small>';
        }
      } catch(re) {
        info.innerHTML = '❌ render() threw:<br>' + re.message;
      }
    }
    animate();

  } catch(e) {
    info.innerHTML = '❌ setup error:<br>' + e.message + '<br>' + (e.stack || '');
  }
}
</script>
</body>
</html>
