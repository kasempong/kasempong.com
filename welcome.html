<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>kasempong.com</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #070414;
      font-family: 'Nunito', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Background ────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url('bg1.webp');
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: bgFade 1.4s 0.1s ease forwards;
      z-index: 0;
    }
    @keyframes bgFade { to { opacity: 1; } }

    /* ── Particle canvas ───────────────────────────────────── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 1;
      pointer-events: none;
    }


    /* ── Center stage ──────────────────────────────────────── */
    #center-stage {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    /* ── Name ──────────────────────────────────────────────── */
    #name-wrap {
      font-weight: 800;
      font-size: clamp(2.6rem, 9vw, 4.8rem);
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #c8a8ff 0%, #f0dcff 40%, #9a78ff 70%, #ddc8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 28px rgba(170,110,255,0.65));
      display: flex;
      gap: 0.01em;
      line-height: 1.1;
    }

    .name-letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(16px) scale(0.82);
      will-change: transform, opacity;
    }
    .name-letter.lit {
      animation: letterPop 0.52s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes letterPop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Tooth ─────────────────────────────────────────────── */
    #tooth {
      font-size: clamp(1.7rem, 5.5vw, 2.6rem);
      line-height: 1;
      opacity: 0;
      transform: scale(0.4) rotate(-40deg);
      will-change: transform, opacity;
    }
    #tooth.show {
      animation: toothPop 0.58s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes toothPop {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    #tooth.float {
      opacity: 1;
      transform: scale(1);
      animation: toothFloat 3.2s ease-in-out infinite;
    }
    @keyframes toothFloat {
      0%, 100% { transform: scale(1) translateY(0); }
      50%       { transform: scale(1) translateY(-7px); }
    }

    /* ── Subtitle ──────────────────────────────────────────── */
    #subtitle {
      font-weight: 400;
      font-size: clamp(0.82rem, 2.6vw, 1.05rem);
      color: rgba(220, 200, 255, 0.7);
      letter-spacing: 0.1em;
      min-height: 1.5em;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #subtitle.visible { opacity: 1; }

    /* ── Enter button ──────────────────────────────────────── */
    #enter-btn {
      font-family: 'Nunito', -apple-system, sans-serif;
      font-weight: 700;
      font-size: clamp(0.88rem, 2.8vw, 1.05rem);
      color: #e8d8ff;
      background: rgba(130, 80, 210, 0.14);
      border: 1.5px solid rgba(175, 125, 255, 0.4);
      border-radius: 50px;
      padding: 11px 30px;
      cursor: pointer;
      letter-spacing: 0.07em;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      will-change: transform, opacity;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    #enter-btn.show {
      animation: btnReveal 0.65s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }
    #enter-btn.pulse {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      animation: btnPulse 2.4s ease-in-out infinite;
    }
    @keyframes btnReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(150,90,255,0.25), 0 0 0 0 rgba(150,90,255,0.18); }
      50%       { box-shadow: 0 0 22px rgba(150,90,255,0.5), 0 0 0 10px rgba(150,90,255,0); }
    }
    #enter-btn:hover {
      background: rgba(130, 80, 210, 0.28);
      border-color: rgba(200, 160, 255, 0.65);
    }
    #enter-btn:active { transform: scale(0.96) !important; }

    /* ── Companions ────────────────────────────────────────── */
    .companion {
      position: fixed;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      will-change: left, top, opacity;
      filter: drop-shadow(0 0 10px rgba(210,180,255,0.55));
      user-select: none;
      line-height: 1;
    }

    /* ── Vortex overlay ────────────────────────────────────── */
    #vortex {
      position: fixed; inset: 0;
      z-index: 40;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at center, #010008 0%, #0b0328 55%, transparent 100%);
      transform: scale(0);
      border-radius: 50%;
    }
    #vortex.expand {
      animation: vortexGrow 0.95s cubic-bezier(0.4, 0, 0.9, 0.9) forwards;
    }
    @keyframes vortexGrow {
      0%   { transform: scale(0);   opacity: 1; border-radius: 50%; }
      55%  { border-radius: 35%; }
      100% { transform: scale(6);   opacity: 1; border-radius: 0; }
    }

    /* Suck-in for center stage on enter */
    #center-stage.suck-in {
      animation: suckCenter 0.6s cubic-bezier(0.6, 0, 1, 0.4) forwards;
    }
    @keyframes suckCenter {
      0%   { transform: translate(-50%, -50%) scale(1)     rotate(0deg);   opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.015) rotate(220deg); opacity: 0; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>


<div id="center-stage">
  <div id="name-wrap"></div>
  <div id="tooth">🦷</div>
  <div id="subtitle"></div>
  <button id="enter-btn">Enter &rarr;</button>
</div>

<!-- Companions -->
<div id="comp-0" class="companion" style="font-size:20px">✦</div>
<div id="comp-1" class="companion" style="font-size:26px">🟡</div>
<div id="comp-2" class="companion" style="font-size:22px">🌙</div>

<div id="vortex"></div>

<script src="welcome.js"></script>
</body>
</html>
