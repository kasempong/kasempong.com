<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>kasempong.com</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #070414;
      font-family: 'Nunito', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Background ────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url('bg1.webp');
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: bgFade 1.4s 0.1s ease forwards;
      z-index: 0;
    }
    @keyframes bgFade { to { opacity: 1; } }

    /* ── Particle canvas ───────────────────────────────────── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 1;
      pointer-events: none;
    }


    /* ── Center stage ──────────────────────────────────────── */
    #center-stage {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    /* ── Name ──────────────────────────────────────────────── */
    #name-wrap {
      font-weight: 800;
      font-size: clamp(2.6rem, 9vw, 4.8rem);
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #c8a8ff 0%, #f0dcff 40%, #9a78ff 70%, #ddc8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 28px rgba(170,110,255,0.65));
      display: flex;
      gap: 0.01em;
      line-height: 1.1;
    }

    .name-letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(16px) scale(0.82);
      will-change: transform, opacity;
    }
    .name-letter.lit {
      animation: letterPop 0.52s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes letterPop {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Tooth ─────────────────────────────────────────────── */
    #tooth {
      font-size: clamp(1.7rem, 5.5vw, 2.6rem);
      line-height: 1;
      opacity: 0;
      transform: scale(0.4) rotate(-40deg);
      will-change: transform, opacity;
    }
    #tooth.show {
      animation: toothPop 0.58s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes toothPop {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    #tooth.float {
      opacity: 1;
      transform: scale(1);
      animation: toothFloat 3.2s ease-in-out infinite;
    }
    @keyframes toothFloat {
      0%, 100% { transform: scale(1) translateY(0); }
      50%       { transform: scale(1) translateY(-7px); }
    }

    /* ── Subtitle ──────────────────────────────────────────── */
    #subtitle {
      font-weight: 400;
      font-size: clamp(0.82rem, 2.6vw, 1.05rem);
      color: rgba(220, 200, 255, 0.7);
      letter-spacing: 0.1em;
      min-height: 1.5em;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #subtitle.visible { opacity: 1; }

    /* ── Enter button ──────────────────────────────────────── */
    #enter-btn {
      font-family: 'Nunito', -apple-system, sans-serif;
      font-weight: 700;
      font-size: clamp(0.88rem, 2.8vw, 1.05rem);
      color: #e8d8ff;
      background: rgba(130, 80, 210, 0.14);
      border: 1.5px solid rgba(175, 125, 255, 0.4);
      border-radius: 50px;
      padding: 11px 30px;
      cursor: pointer;
      letter-spacing: 0.07em;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      will-change: transform, opacity;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s, border-color 0.2s;
    }
    #enter-btn.show {
      animation: btnReveal 0.65s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
    }
    #enter-btn.pulse {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      animation: btnPulse 2.4s ease-in-out infinite;
    }
    @keyframes btnReveal {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(150,90,255,0.25), 0 0 0 0 rgba(150,90,255,0.18); }
      50%       { box-shadow: 0 0 22px rgba(150,90,255,0.5), 0 0 0 10px rgba(150,90,255,0); }
    }
    #enter-btn:hover {
      background: rgba(130, 80, 210, 0.28);
      border-color: rgba(200, 160, 255, 0.65);
    }
    #enter-btn:active { transform: scale(0.96) !important; }

    /* ── Companions ────────────────────────────────────────── */
    .companion {
      position: fixed;
      z-index: 8;
      pointer-events: none;
      opacity: 0;
      will-change: left, top, opacity;
      filter: drop-shadow(0 0 10px rgba(210,180,255,0.55));
      user-select: none;
      line-height: 1;
    }

    /* ── Vortex overlay ────────────────────────────────────── */
    #vortex {
      position: fixed; inset: 0;
      z-index: 40;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at center, #010008 0%, #0b0328 55%, transparent 100%);
      transform: scale(0);
      border-radius: 50%;
    }
    #vortex.expand {
      animation: vortexGrow 0.95s cubic-bezier(0.4, 0, 0.9, 0.9) forwards;
    }
    @keyframes vortexGrow {
      0%   { transform: scale(0);   opacity: 1; border-radius: 50%; }
      55%  { border-radius: 35%; }
      100% { transform: scale(6);   opacity: 1; border-radius: 0; }
    }

    /* Suck-in for center stage on enter */
    #center-stage.suck-in {
      animation: suckCenter 0.6s cubic-bezier(0.6, 0, 1, 0.4) forwards;
    }
    @keyframes suckCenter {
      0%   { transform: translate(-50%, -50%) scale(1)     rotate(0deg);   opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.015) rotate(220deg); opacity: 0; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>


<div id="center-stage">
  <div id="name-wrap"></div>
  <div id="tooth">🦷</div>
  <div id="subtitle"></div>
  <button id="enter-btn">Enter &rarr;</button>
</div>

<!-- Companions -->
<div id="comp-0" class="companion" style="font-size:20px">✦</div>
<div id="comp-1" class="companion" style="font-size:26px">🟡</div>
<div id="comp-2" class="companion" style="font-size:22px">🌙</div>

<div id="vortex"></div>

<script>
'use strict';

// ── Particle canvas ───────────────────────────────────────────────
var canvas  = document.getElementById('bg-canvas');
var ctx     = canvas.getContext('2d');
var pars    = [];
var GLYPHS  = ['✦', '✧', '⋆', '🌙'];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function makePar() {
  return {
    x:          Math.random() * canvas.width,
    y:          canvas.height + 10 + Math.random() * 80,
    glyph:      GLYPHS[Math.floor(Math.random() * GLYPHS.length)],
    size:       9 + Math.random() * 11,
    vy:         0.22 + Math.random() * 0.40,
    vx:         (Math.random() - 0.5) * 0.16,
    opacity:    0,
    maxOpacity: 0.12 + Math.random() * 0.22,
    dying:      false,
  };
}

function initPars() {
  pars = [];
  for (var i = 0; i < 45; i++) {
    var p = makePar();
    p.y = Math.random() * (canvas.height + 50); // pre-scatter
    pars.push(p);
  }
}

function tickPars() {
  for (var i = 0; i < pars.length; i++) {
    var p = pars[i];
    p.y -= p.vy;
    p.x += p.vx;
    if (!p.dying) p.opacity = Math.min(p.opacity + 0.007, p.maxOpacity);
    if (p.y < canvas.height * 0.12) { p.dying = true; p.opacity -= 0.004; }
    if (p.opacity <= 0 && p.dying) pars[i] = makePar();
  }
}

function drawPars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (var i = 0; i < pars.length; i++) {
    var p = pars[i];
    if (p.opacity <= 0) continue;
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.font = p.size + 'px serif';
    ctx.fillText(p.glyph, p.x, p.y);
    ctx.restore();
  }
}

// ── Companions ────────────────────────────────────────────────────
var COMP_CFG = [
  { radiusBase: 112, baseAngle: 0,    speed: 0.44, flyDelay: 2900 },
  { radiusBase: 155, baseAngle: 2.09, speed: 0.27, flyDelay: 3550 },
  { radiusBase: 198, baseAngle: 4.19, speed: 0.17, flyDelay: 4200 },
];
var FLY_DUR = 900;
var showComps = Math.min(window.innerWidth, window.innerHeight) >= 480;

function getRadius(base) {
  var minDim = Math.min(window.innerWidth, window.innerHeight);
  return base * Math.max(0.58, Math.min(1.0, minDim / 640));
}

function orbitXY(cfg, angle) {
  var cx = window.innerWidth  / 2;
  var cy = window.innerHeight / 2;
  var r  = getRadius(cfg.radiusBase);
  // Slightly elliptical on small screens so companions stay to sides
  var wide = window.innerWidth < 560 ? 1.4 : 1.0;
  return {
    x: cx + r * wide   * Math.cos(angle) - 14,
    y: cy + r * 0.82   * Math.sin(angle) - 14,
  };
}

function offScreenXY(idx) {
  var cx = window.innerWidth  / 2;
  var cy = window.innerHeight / 2;
  if (idx === 0) return { x: window.innerWidth  + 50, y: cy - 90 };
  if (idx === 1) return { x: cx + 40,              y: window.innerHeight + 50 };
  return             { x: -50,                    y: cy + 70 };
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

var compEls = [
  document.getElementById('comp-0'),
  document.getElementById('comp-1'),
  document.getElementById('comp-2'),
];

var compState = COMP_CFG.map(function(cfg, i) {
  return {
    cfg:           cfg,
    el:            compEls[i],
    phase:         'waiting',   // waiting | flying | orbiting
    flyStart:      null,
    flyFrom:       null,
    orbitStart:    null,
  };
});

// ── Main RAF loop ─────────────────────────────────────────────────
var rafId       = null;
var loopAlive   = true;
var loopT0      = null;

function mainLoop(ts) {
  if (!loopT0) loopT0 = ts;
  var elapsed = ts - loopT0;

  // Companions fly-in trigger
  if (showComps) {
    compState.forEach(function(s, idx) {
      if (s.phase === 'waiting' && elapsed >= s.cfg.flyDelay) {
        s.phase    = 'flying';
        s.flyStart = ts;
        s.flyFrom  = offScreenXY(idx);
      }
    });

    compState.forEach(function(s) {
      if (s.phase === 'flying') {
        var t    = Math.min((ts - s.flyStart) / FLY_DUR, 1);
        var ease = easeOut(t);
        var tgt  = orbitXY(s.cfg, s.cfg.baseAngle);
        s.el.style.left    = (s.flyFrom.x + (tgt.x - s.flyFrom.x) * ease) + 'px';
        s.el.style.top     = (s.flyFrom.y + (tgt.y - s.flyFrom.y) * ease) + 'px';
        s.el.style.opacity = String(Math.min(ease * 1.3, 1));
        if (t >= 1) { s.phase = 'orbiting'; s.orbitStart = ts; }
      } else if (s.phase === 'orbiting') {
        var sec   = (ts - s.orbitStart) / 1000;
        var angle = s.cfg.baseAngle + s.cfg.speed * sec;
        var pos   = orbitXY(s.cfg, angle);
        s.el.style.left    = pos.x + 'px';
        s.el.style.top     = pos.y + 'px';
        s.el.style.opacity = '1';
      }
    });
  }

  tickPars();
  drawPars();

  if (loopAlive) rafId = requestAnimationFrame(mainLoop);
}

// ── Name letters ─────────────────────────────────────────────────
var NAME     = 'Kasempong';
var nameWrap = document.getElementById('name-wrap');
NAME.split('').forEach(function(ch) {
  var s = document.createElement('span');
  s.className   = 'name-letter';
  s.textContent = ch;
  nameWrap.appendChild(s);
});
var nameLetters = nameWrap.querySelectorAll('.name-letter');

function revealName() {
  nameLetters.forEach(function(el, i) {
    setTimeout(function() { el.classList.add('lit'); }, i * 190);
  });
}

// ── Tooth ─────────────────────────────────────────────────────────
var toothEl = document.getElementById('tooth');

function revealTooth() {
  toothEl.classList.add('show');
  setTimeout(function() {
    toothEl.classList.remove('show');
    toothEl.style.opacity   = '1';
    toothEl.style.transform = 'scale(1)';
    requestAnimationFrame(function() { toothEl.classList.add('float'); });
  }, 680);
}

// ── Subtitle typewriter ───────────────────────────────────────────
var subEl = document.getElementById('subtitle');
var SUB   = 'Be humble. Be patient.';

function typeSubtitle() {
  subEl.classList.add('visible');
  var i = 0;
  var iv = setInterval(function() {
    subEl.textContent += SUB[i++];
    if (i >= SUB.length) clearInterval(iv);
  }, 62);
}

// ── Enter button ──────────────────────────────────────────────────
var enterBtn = document.getElementById('enter-btn');

function showEnterBtn() {
  enterBtn.classList.add('show');
  setTimeout(function() {
    enterBtn.classList.remove('show');
    enterBtn.style.opacity   = '1';
    enterBtn.style.transform = 'translateY(0)';
    requestAnimationFrame(function() { enterBtn.classList.add('pulse'); });
  }, 700);
}

// ── Black hole transition ─────────────────────────────────────────
var entered = false;

function triggerBlackHole() {
  if (entered) return;
  entered = true;
  enterBtn.disabled = true;
  loopAlive = false;
  cancelAnimationFrame(rafId);

  var cx = window.innerWidth  / 2;
  var cy = window.innerHeight / 2;

  // Suck center stage inward
  document.getElementById('center-stage').classList.add('suck-in');

  // Suck companions to center
  compEls.forEach(function(el) {
    el.style.transition = 'left 0.5s ease-in, top 0.5s ease-in, transform 0.5s ease-in, opacity 0.4s ease-in';
    el.style.left       = (cx - 14) + 'px';
    el.style.top        = (cy - 14) + 'px';
    el.style.transform  = 'scale(0.04) rotate(400deg)';
    el.style.opacity    = '0';
  });

  // Fade out particles
  canvas.style.transition = 'opacity 0.45s ease';
  canvas.style.opacity    = '0';

  // Expand vortex with small delay so suck-in plays first
  setTimeout(function() {
    document.getElementById('vortex').classList.add('expand');
  }, 80);

  // Navigate
  setTimeout(function() {
    sessionStorage.setItem('_entered', '1');
    window.location.replace('/');
  }, 980);
}

enterBtn.addEventListener('click', triggerBlackHole);
enterBtn.addEventListener('touchend', function(e) {
  e.preventDefault();
  triggerBlackHole();
});


// ── Boot sequence ─────────────────────────────────────────────────
resizeCanvas();
initPars();
requestAnimationFrame(mainLoop);

// Name letters: 500ms
setTimeout(revealName, 500);

// Tooth: after last letter (500 + 8×190 + 500 buffer = ~2520ms)
setTimeout(revealTooth, 2550);

// Subtitle: 2950ms
setTimeout(typeSubtitle, 2950);

// Enter button: subtitle done (~2950 + 22×62 ≈ 4314ms) + 200ms buffer
setTimeout(showEnterBtn, 4550);

window.addEventListener('resize', resizeCanvas);
</script>
</body>
</html>
