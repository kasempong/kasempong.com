<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>kasempong.com</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦷</text></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #fdf8f4;
      font-family: 'Nunito', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    }

    /* Warm background matching homepage bg1 */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url('bg1.webp'), url('bg1.png');
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: bgFadeIn 0.6s 0.1s ease forwards;
      z-index: 0;
    }

    @keyframes bgFadeIn {
      to { opacity: 1; }
    }

    /* Stage */
    .stage {
      position: fixed; inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 12vh;
      pointer-events: none;
    }

    /* Name tag that floats above Kuromi */
    .name-tag {
      font-size: clamp(18px, 5vw, 26px);
      font-weight: 700;
      color: #4a2060;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 12px rgba(255,255,255,0.9), 0 0 24px rgba(200,120,255,0.4);
      opacity: 0;
      transform: translateY(10px);
      margin-bottom: 8px;
      /* shown during the pause phase */
    }

    /* Kuromi character */
    .kuromi {
      width: clamp(90px, 22vw, 140px);
      height: auto;
      display: block;
      /* start off-screen right */
      transform: translateX(120vw) scaleX(-1);
      filter: drop-shadow(0 8px 20px rgba(120,0,180,0.3));
      will-change: transform;
    }

    /* ── Animation phases ─────────────────────────────────────── */

    /* Phase 1: slide in from right (0 → 0.85s) */
    .kuromi.phase-enter {
      animation: slideIn 0.85s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes slideIn {
      from { transform: translateX(120vw) scaleX(-1); }
      to   { transform: translateX(0)     scaleX(-1); }
    }

    /* Phase 2: bounce at center (0.85 → 1.65s) */
    .kuromi.phase-bounce {
      transform: translateX(0) scaleX(-1);
      animation: bounce 0.8s ease forwards;
    }
    @keyframes bounce {
      0%   { transform: translateX(0) scaleX(-1) translateY(0); }
      22%  { transform: translateX(0) scaleX(-1) translateY(-18px); }
      44%  { transform: translateX(0) scaleX(-1) translateY(0); }
      66%  { transform: translateX(0) scaleX(-1) translateY(-10px); }
      84%  { transform: translateX(0) scaleX(-1) translateY(0); }
      100% { transform: translateX(0) scaleX(-1) translateY(0); }
    }

    /* Name tag appear during pause */
    .name-tag.show {
      animation: tagPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes tagPop {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Phase 3: hold (1.65 → 2.65s) — no animation, just stays */
    .kuromi.phase-hold {
      transform: translateX(0) scaleX(-1);
    }

    /* Phase 4: exit left (2.65 → 3.25s) */
    .kuromi.phase-exit {
      transform: translateX(0) scaleX(-1);
      animation: slideOut 0.6s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }
    @keyframes slideOut {
      from { transform: translateX(0)      scaleX(1); opacity: 1; }
      to   { transform: translateX(-120vw) scaleX(1); opacity: 0; }
    }

    /* Name tag fade with exit */
    .name-tag.hide {
      animation: tagFade 0.4s ease forwards;
    }
    @keyframes tagFade {
      to { opacity: 0; transform: translateY(-8px); }
    }

    /* Final page fade-out */
    body.fade-out {
      animation: pageFade 0.45s ease forwards;
    }
    @keyframes pageFade {
      to { opacity: 0; }
    }

    /* Sparkle particles */
    .sparkles {
      position: fixed; inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .sp {
      position: absolute;
      font-size: 18px;
      opacity: 0;
      animation: spFloat var(--dur) var(--delay) ease-in-out infinite;
    }
    @keyframes spFloat {
      0%   { opacity: 0; transform: translateY(0)    scale(0.8); }
      30%  { opacity: 0.7; }
      70%  { opacity: 0.5; }
      100% { opacity: 0; transform: translateY(-60px) scale(1.1); }
    }
  </style>
</head>
<body>

  <!-- Ambient sparkles -->
  <div class="sparkles" id="sparkles"></div>

  <!-- Stage: name tag + Kuromi -->
  <div class="stage">
    <div class="name-tag" id="nameTag">kasempong.com ✨</div>
    <img class="kuromi" id="kuromi" src="kuromi.webp" alt="" draggable="false">
  </div>

  <script>
    'use strict';

    // ── Sparkles ──────────────────────────────────────────────
    var container = document.getElementById('sparkles');
    var glyphs = ['✦','✧','⋆','✨','💜','🌸','⭐'];
    for (var i = 0; i < 14; i++) {
      var sp = document.createElement('span');
      sp.className = 'sp';
      sp.textContent = glyphs[i % glyphs.length];
      sp.style.left  = (Math.random() * 92 + 4) + '%';
      sp.style.top   = (Math.random() * 75 + 5) + '%';
      sp.style.setProperty('--dur',   (2.2 + Math.random() * 2.5) + 's');
      sp.style.setProperty('--delay', (Math.random() * 2.5) + 's');
      container.appendChild(sp);
    }

    // ── Phase sequencer ───────────────────────────────────────
    var kuromi  = document.getElementById('kuromi');
    var nameTag = document.getElementById('nameTag');

    function setPhase(phase) {
      kuromi.className = 'kuromi phase-' + phase;
    }

    // 0.15s  — enter
    setTimeout(function () { setPhase('enter'); }, 150);

    // 1.0s   — bounce
    setTimeout(function () { setPhase('bounce'); }, 1000);

    // 1.8s   — hold + show name
    setTimeout(function () {
      setPhase('hold');
      nameTag.classList.add('show');
    }, 1800);

    // 2.85s  — exit + hide name
    setTimeout(function () {
      setPhase('exit');
      nameTag.classList.remove('show');
      nameTag.classList.add('hide');
    }, 2850);

    // 3.4s   — fade page → redirect
    setTimeout(function () {
      document.body.classList.add('fade-out');
      setTimeout(function () {
        window.location.replace('/');
      }, 440);
    }, 3400);
  </script>

</body>
</html>
